name: Migration Data Update

on:

  workflow_dispatch:

  schedule:

    - cron: "0 */6 * * *"

permissions:

  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

      - name: Setup Node

        uses: actions/setup-node@v4

        with:

          node-version: 20

      - name: Execute live migration update

        run: node scripts/update-live-data.mjs

      - name: Commit updated data

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add public/data

          git add public/last-update.json

          git diff --cached --quiet || git commit -m "Automatic live migration update"

          git push
