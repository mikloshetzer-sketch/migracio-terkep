name: Migration Data Update

on:

  workflow_dispatch:

  schedule:

    - cron: "0 5 * * *"

    - cron: "0 11 * * *"

    - cron: "0 17 * * *"

permissions:

  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Node

        uses: actions/setup-node@v4

        with:

          node-version: 20

      - name: Repository status

        run: |

          echo "Migration Intelligence Center"

          echo "Data update started"

          date

      - name: Commit placeholder

        run: |

          echo '{"last_update":"'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"}' > public/last-update.json

      - name: Commit changes

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add .

          git diff --cached --quiet || git commit -m "Automatic migration update"

          git push
