name: Build EMIC Data

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build derived data from existing files
        run: node scripts/build-existing-data.mjs

      # Később ide jönnek:
      # - name: Update Frontex data
      #   run: node scripts/update-frontex.mjs
      #
      # - name: Update EUAA data
      #   run: node scripts/update-euaa.mjs
      #
      # - name: Update Eurostat data
      #   run: node scripts/update-eurostat.mjs
      #
      # - name: Update Eurodac data
      #   run: node scripts/update-eurodac.mjs
      #
      # - name: Build pressure index
      #   run: node scripts/build-pressure-index.mjs

      - name: Commit generated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/data/derived
          git diff --cached --quiet || git commit -m "Build EMIC derived data"
          git push
