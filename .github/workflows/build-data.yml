name: Build EMIC Data

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

concurrency:
  group: emic-data
  cancel-in-progress: false

jobs:
  build-data:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      ##################################################
      # EXISTING REPOSITORY DATA
      ##################################################

      - name: Build existing migration data
        run: node scripts/build-existing-data.mjs

      ##################################################
      # OFFICIAL SOURCES
      ##################################################

      - name: Update Frontex data
        run: node scripts/update-frontex.mjs

      ##################################################
      # FUTURE SOURCES
      ##################################################

      # - name: Update EUAA data
      #   run: node scripts/update-euaa.mjs

      # - name: Update Eurostat data
      #   run: node scripts/update-eurostat.mjs

      # - name: Update Eurodac data
      #   run: node scripts/update-eurodac.mjs

      ##################################################
      # COMMIT GENERATED FILES
      ##################################################

      - name: Commit generated files

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git add public/data

          git diff --cached --quiet || git commit -m "EMIC data update"

          git push
