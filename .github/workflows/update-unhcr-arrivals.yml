name: Update UNHCR Arrivals

on:
  workflow_dispatch:

  schedule:
    - cron: "20 4 * * *"

permissions:
  contents: write

jobs:
  update-unhcr-arrivals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run UNHCR arrivals update
        run: node scripts/update-unhcr-arrivals.mjs

      - name: Check generated file
        run: |
          echo "Generated migration data:"
          ls -lah public/data/migration
          echo ""
          echo "Preview:"
          head -n 40 public/data/migration/unhcr-arrivals.json

      - name: Commit updated UNHCR data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/migration/unhcr-arrivals.json

          if git diff --cached --quiet; then
            echo "No UNHCR data changes to commit."
            exit 0
          fi

          git commit -m "Update UNHCR migration arrivals data"
          git push
