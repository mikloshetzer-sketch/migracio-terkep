name: Update UNHCR Arrivals

on:
  workflow_dispatch:

  schedule:
    - cron: "20 4 * * *"

permissions:
  contents: write

jobs:
  update-unhcr-arrivals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update UNHCR arrivals data
        run: node scripts/update-unhcr-arrivals.mjs

      - name: Update arrival snapshot history
        run: node scripts/update-arrival-snapshots.mjs

      - name: Check generated files
        run: |
          echo "Generated migration data:"
          ls -lah public/data/migration

          echo ""
          echo "UNHCR arrivals preview:"
          head -n 40 public/data/migration/unhcr-arrivals.json

          echo ""
          echo "Arrival snapshots preview:"
          head -n 60 public/data/migration/arrival-snapshots.json

      - name: Commit updated migration data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/migration/unhcr-arrivals.json
          git add public/data/migration/arrival-snapshots.json

          if git diff --cached --quiet; then
            echo "No migration data changes to commit."
            exit 0
          fi

          git commit -m "Update UNHCR arrivals and snapshot history"
          git push
